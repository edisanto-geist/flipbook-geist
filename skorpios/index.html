<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geist Brochure Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
:root{
 --navy:#1a2a6c;
 --bg:#eef1f7;
}

body{
 margin:0;
 font-family:Inter,Arial;
 background:var(--bg);
 display:flex;
 flex-direction:column;
 height:100vh;
}

header{
 background:var(--navy);
 color:white;
 padding:15px 20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

header select, header button{
 padding:10px;
 border:none;
 border-radius:8px;
}

#viewer{
 flex:1;
 display:flex;
 justify-content:center;
 align-items:center;
 overflow:auto;
 padding:20px;
}

canvas{
 box-shadow:0 10px 30px rgba(0,0,0,.15);
 max-width:100%;
 height:auto;
}

footer{
 background:var(--navy);
 padding:12px;
 display:flex;
 justify-content:center;
 gap:12px;
 align-items:center;
 color:white;
}

button{
 cursor:pointer;
}
</style>
</head>
<body>

<header>
<div><b>GEIST Flipbook</b></div>

<select id="bookSelect"></select>
</header>

<div id="viewer">
<canvas id="pdfCanvas"></canvas>
</div>

<footer>
<button id="prev">◀</button>
<span id="pageInfo"></span>
<button id="next">▶</button>

<button id="zoomOut">−</button>
<span id="zoomPct">100%</span>
<button id="zoomIn">+</button>
</footer>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const LIBROS = [
 { id:"skorpios", nombre:"Salida Grupal Skorpios", archivo:"pdfs/Skorpios.pdf" }
];

const select=document.getElementById("bookSelect");
const canvas=document.getElementById("pdfCanvas");
const ctx=canvas.getContext("2d");

const pageInfo=document.getElementById("pageInfo");
const zoomPct=document.getElementById("zoomPct");

let pdf=null;
let pageNum=1;
let scale=2.2;

LIBROS.forEach(libro=>{
 const opt=document.createElement("option");
 opt.value=libro.id;
 opt.textContent=libro.nombre;
 select.appendChild(opt);
});

async function loadPDF(path){
 pdf=await pdfjsLib.getDocument(path).promise;
 pageNum=1;
 renderPage();
}

async function renderPage(){
 const page=await pdf.getPage(pageNum);
 const viewport=page.getViewport({scale});

 canvas.width=viewport.width;
 canvas.height=viewport.height;

 await page.render({
   canvasContext:ctx,
   viewport
 }).promise;

 pageInfo.textContent=`${pageNum} / ${pdf.numPages}`;
 zoomPct.textContent=Math.round(scale*100/2.2)+"%";
}

document.getElementById("prev").onclick=()=>{
 if(pageNum>1){
   pageNum--;
   renderPage();
 }
};

document.getElementById("next").onclick=()=>{
 if(pageNum<pdf.numPages){
   pageNum++;
   renderPage();
 }
};

document.getElementById("zoomIn").onclick=()=>{
 scale*=1.2;
 renderPage();
};

document.getElementById("zoomOut").onclick=()=>{
 scale/=1.2;
 renderPage();
};

document.getElementById("viewer").addEventListener("wheel", e=>{
 if(e.ctrlKey){
   e.preventDefault();
   if(e.deltaY<0) scale*=1.1;
   else scale/=1.1;
   renderPage();
 }
},{passive:false});

select.addEventListener("change",()=>{
 const libro=LIBROS.find(x=>x.id===select.value);
 loadPDF(libro.archivo);
});

loadPDF(LIBROS[0].archivo);
</script>
</body>
</html>
